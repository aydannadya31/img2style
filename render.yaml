services:
  - type: web
    name: image-to-video
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/status
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: AGNES_API_KEY
        sync: false
      - key: MUAPI_API_KEY
        sync: false
      - key: PORT
        value: 10000
